<!doctype html><html lang="zh"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>一眼万年 · The Game Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital@1&family=Noto+Serif+SC:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{ --N:#9aa3b2; --R:#5aa6ff; --SR:#bd7dff; --SSR:#ffd34d; --gold:#caa44a; --goldL:#f6d98a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#05050a radial-gradient(120% 90% at 50% 28%,#16131f,#05050a 72%);
    overflow:hidden;font-family:'Noto Serif SC',serif;color:#f0e9da;user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;overflow:hidden;display:grid;place-items:center;z-index:2}
  .card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
  /* 黄金比例 1:1.618 + 翻牌 3D */
  .floatwrap{transform-style:preserve-3d;will-change:transform}
  .card.revealed .floatwrap{animation:revIn .55s ease-out, floaty 4.6s ease-in-out infinite .6s}
  @keyframes revIn{0%{transform:scale(.965)}100%{transform:scale(1)}}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-9px) rotate(.5deg)}}
  .flip{position:relative;width:min(88vw, calc(80vh / 1.618));aspect-ratio:1 / 1.618;
    transform-style:preserve-3d;transition:transform .55s cubic-bezier(.3,.85,.3,1)}
  .flip.flipped{transform:rotateY(180deg)}
  /* 翻转瞬间：背面中心图案立即消失（不延迟）*/
  .flip.flipped .pat,.flip.flipped .ring,.flip.flipped .emblem,.flip.flipped .bhint,.flip.flipped .sheen,.flip.flipped .spark{opacity:0;transition:opacity .07s}
  .face{position:absolute;inset:0;border-radius:18px;overflow:hidden;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 26px 70px rgba(0,0,0,.7)}

  /* ── 背面：高级暗纹 + 徽记 + 点缀动画 ── */
  .back{background:radial-gradient(120% 90% at 50% 0%,#241f38,#0a0810 74%);border:1px solid rgba(212,175,55,.35)}
  .back .pat{position:absolute;inset:0;opacity:.18;
    background-image:repeating-linear-gradient(45deg,rgba(212,175,55,.5) 0 1px,transparent 1px 15px),
      repeating-linear-gradient(-45deg,rgba(212,175,55,.5) 0 1px,transparent 1px 15px)}
  .back .pat::after{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 50% 46%,transparent 30%,rgba(5,5,10,.7))}
  .back .ring{position:absolute;left:50%;top:46%;width:62%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;
    background:conic-gradient(from 0deg,transparent,rgba(202,164,74,.3),transparent 55%);filter:blur(8px);animation:spin 7s linear infinite}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .back .emblem{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:34%;aspect-ratio:1;z-index:2;
    display:grid;place-items:center;border:1px solid rgba(212,175,55,.45);border-radius:50%;
    color:var(--gold);font-size:13vw;text-shadow:0 0 26px rgba(202,164,74,.6)}
  .back .emblem::before{content:"";position:absolute;inset:8%;border:1px solid rgba(212,175,55,.22);border-radius:50%}
  .back .bhint{position:absolute;left:0;right:0;bottom:9%;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.34em;color:#8a7c52}
  .back .sheen{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg,transparent 38%,rgba(255,240,190,.16) 50%,transparent 62%);
    background-size:260% 100%;animation:sheen 3s linear infinite}
  @keyframes sheen{0%{background-position:210% 0}100%{background-position:-70% 0}}
  .spark{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffe9a8;box-shadow:0 0 8px #ffe9a8;opacity:0;z-index:3}
  @keyframes rise{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:.9}100%{opacity:0;transform:translateY(-120px) scale(1)}}

  /* ── 正面：收藏卡构图 ── */
  .front{transform:rotateY(180deg);display:flex;flex-direction:column;padding:14px 13px 12px;
    background:radial-gradient(120% 90% at 50% 0%,#1d1830,#0a0810 78%);border:1px solid var(--rc);transition:box-shadow .5s}
  .flip.flipped .front{box-shadow:0 0 54px 5px var(--rc),0 26px 70px rgba(0,0,0,.7)}
  /* 翻开光扫 */
  .front::after{content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:4;opacity:0;
    background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.42) 50%,transparent 58%);background-size:250% 100%;background-position:210% 0}
  .card.revealed .front::after{animation:revSheen .85s ease-out .12s}
  @keyframes revSheen{0%{opacity:0;background-position:210% 0}30%{opacity:.9}100%{opacity:0;background-position:-60% 0}}
  .front .crown{display:flex;align-items:center;justify-content:space-between;padding:0 2px 9px}
  .front .gem{width:14px;height:14px;background:var(--rc);transform:rotate(45deg);box-shadow:0 0 12px var(--rc)}
  .front .rt{font-family:'Cinzel',serif;font-weight:600;font-size:12px;letter-spacing:.2em;color:var(--rc)}
  .window{position:relative;flex:1;border-radius:10px;overflow:hidden;
    border:1px solid rgba(212,175,55,.55);box-shadow:inset 0 0 34px rgba(0,0,0,.65)}
  .fartbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(22px) brightness(.42);transform:scale(1.12)}
  .fart{position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat}
  .plate{padding:11px 4px 2px;text-align:center}
  .plate .ttl{font-weight:700;font-size:19px;line-height:1.25;text-shadow:0 2px 10px #000}
  .plate .by{font-size:12.5px;color:#cdbca0;margin-top:3px}
  .stars{color:var(--rc);letter-spacing:1px;font-size:11px}
  .serial{display:flex;justify-content:space-between;margin-top:10px;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.1em;color:#9a8550;opacity:.85}
  .plate .divider{height:10px;margin:7px 0 6px;background:
    radial-gradient(circle at 50% 50%, var(--gold) 0 2px, transparent 2px) center/100% 100% no-repeat;}
  .plate .divider::before,.plate .divider::after{content:"";display:inline-block;width:34%;height:1px;vertical-align:middle;
    background:linear-gradient(90deg,transparent,var(--gold));margin:0 6px}
  .plate .divider::after{background:linear-gradient(90deg,var(--gold),transparent)}
  .plate .line{font-family:'Cormorant Garamond','Noto Serif SC',serif;font-style:italic;font-size:15.5px;color:#e7dcc2;line-height:1.45}
  /* 翻开后 标题/作者/题词 错峰升起 */
  .plate .ttl,.plate .by,.plate .line{opacity:0;transform:translateY(9px);transition:opacity .5s,transform .5s}
  .flip.flipped .plate .ttl{opacity:1;transform:none;transition-delay:.2s}
  .flip.flipped .plate .by{opacity:1;transform:none;transition-delay:.3s}
  .flip.flipped .plate .line{opacity:1;transform:none;transition-delay:.42s}

  @keyframes slideIn{from{transform:translateY(10%);opacity:0}to{transform:none;opacity:1}}
  .card.in{animation:slideIn .4s cubic-bezier(.2,.8,.2,1)}
  /* 蓄力：辉光渐强 + 极轻微缩放呼吸（无平移抖动，不晕）*/
  .card.charging{animation:breathe var(--build,400ms) ease-in forwards}
  .card.charging .back{animation:chargeGlow var(--build,400ms) ease-in forwards}
  @keyframes breathe{0%{transform:scale(1)}70%{transform:scale(1.025)}100%{transform:scale(1.045)}}
  @keyframes chargeGlow{0%{box-shadow:0 0 0 0 var(--rc),0 26px 70px rgba(0,0,0,.7)}100%{box-shadow:0 0 84px 18px var(--rc),0 26px 70px rgba(0,0,0,.7)}}
  /* 中奖待手翻：背面按稀有度发光脉动 */
  .card.pending .back{border-color:var(--rc);animation:pend 1.05s ease-in-out infinite}
  .card.pending .emblem,.card.pending .bhint{color:var(--rc)}
  @keyframes pend{0%,100%{box-shadow:0 0 26px 4px var(--rc),0 26px 70px rgba(0,0,0,.7)}50%{box-shadow:0 0 66px 16px var(--rc),0 26px 70px rgba(0,0,0,.7)}}

  #flash{position:fixed;inset:0;pointer-events:none;z-index:9;opacity:0;background:radial-gradient(circle at 50% 45%,var(--bc,#fff8e0),transparent 60%)}
  @keyframes jack{0%{opacity:0}12%{opacity:var(--int,.6)}100%{opacity:0}}
  #flash.go{animation:jack .75s ease-out}
  /* ── SSR/SR 炫酷层 ── */
  /* 全息箔片：流动虹彩 sheen 叠在卡面 */
  .holo{position:absolute;inset:0;pointer-events:none;border-radius:18px;opacity:0;mix-blend-mode:overlay;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.55) 45%,transparent 60%),
      linear-gradient(60deg,#ff5cf4,#5cf0ff,#fff05c,#ff5cf4);
    background-size:220% 220%,300% 300%;background-blend-mode:overlay;animation:holoMove 5.5s linear infinite}
  @keyframes holoMove{0%{background-position:0 0,0 0}100%{background-position:220% 0,300% 0}}
  .front.holo-on .holo{opacity:.22} .front.holo-lite .holo{opacity:.11}
  /* 神光：SSR 翻开放射的旋转光束 */
  #rays{position:fixed;left:50%;top:48%;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);z-index:8;opacity:0;pointer-events:none;
    background:repeating-conic-gradient(from 0deg,rgba(255,236,170,.55) 0 5deg,transparent 5deg 16deg)}
  @keyframes raysGo{0%{opacity:0;width:8px;height:8px}18%{opacity:.75}100%{opacity:0;width:1500px;height:1500px;transform:translate(-50%,-50%) rotate(44deg)}}
  #rays.go{animation:raysGo 1.05s ease-out}
  /* 金粒爆射 */
  .burstdot{position:fixed;left:50%;top:48%;width:7px;height:7px;border-radius:50%;background:#ffe9a8;box-shadow:0 0 10px #ffd34d;z-index:9;pointer-events:none;animation:burst .85s ease-out forwards}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}15%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1)}}
  /* 翻开缩放冲击 */
  @keyframes punch{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}
  .card.revealpunch{animation:punch .45s ease-out}
  @media(prefers-reduced-motion:reduce){ .holo,.back .ring,.back .sheen,.spark,.card.revealed .floatwrap{animation:none!important} }
  .heart{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.2);font-size:120px;color:#ff5a7a;pointer-events:none;z-index:8;opacity:0;text-shadow:0 0 30px #ff5a7a}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}70%{opacity:1;transform:translate(-50%,-60%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(.9)}}
  .heart.go{animation:pop .85s ease-out}

  #hud{position:fixed;top:calc(12px + env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;z-index:5;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;color:#cdbca0;pointer-events:none}
  #hearts{color:#ff7a92}
  #hint{position:fixed;bottom:calc(8px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;font-size:11px;letter-spacing:.08em;color:#8a8170;z-index:5;pointer-events:none}
  .fab{position:fixed;z-index:6;font-family:'Cinzel',serif;font-weight:700;font-size:13px;letter-spacing:.08em;border:none;border-radius:999px;cursor:pointer;display:none}
  #benmingBtn{right:16px;bottom:calc(54px + env(safe-area-inset-bottom));padding:11px 16px;color:#11100a;background:linear-gradient(#ffe9a8,#e8c14a);box-shadow:0 8px 30px rgba(232,193,74,.5)}
  #touchlayer{position:fixed;inset:0;z-index:4;background:transparent;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}

  /* ── 鉴赏页：大图缩放 + 完整信息 ── */
  #appraise{position:fixed;inset:0;z-index:25;background:rgba(4,3,8,.985);display:none;flex-direction:column;overflow:hidden}
  #appraise.show{display:flex}
  #appraise.peek{display:flex;z-index:1;pointer-events:none}  /* 下拉预览：垫在卡片后面随手指显形 */
  #apBar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:calc(8px + env(safe-area-inset-top)) 16px 8px;font-family:'Cinzel',serif;letter-spacing:.34em;font-size:12px;color:#9a8d6e}
  #apClose{width:36px;height:36px;border-radius:50%;background:rgba(30,24,30,.7);border:1px solid #ffffff22;color:#e7dcc2;font-size:19px;cursor:pointer}
  #apImgWrap{flex:1;min-height:36vh;position:relative;overflow:hidden;touch-action:none}
  #apImg{position:absolute;inset:8px;background-size:contain;background-position:center;background-repeat:no-repeat;
    transition:transform .12s ease-out;-webkit-touch-callout:none}
  #apZoomHint{position:absolute;left:0;right:0;bottom:6px;text-align:center;font-size:11px;letter-spacing:.1em;color:#8a8170;pointer-events:none}
  #apInfo{flex-shrink:0;max-height:44vh;overflow-y:auto;padding:14px 22px calc(22px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(212,175,55,.14);-webkit-overflow-scrolling:touch}
  #apInfo .rt{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;color:var(--rc)}
  #apInfo .ttl{font-weight:700;font-size:24px;margin:8px 0 4px;line-height:1.25}
  #apInfo .by{font-size:14px;color:#cdbca0}
  #apInfo .line{font-family:'Cormorant Garamond','Noto Serif SC',serif;font-style:italic;font-size:18px;color:#e7dcc2;margin:14px 0}
  #apInfo .field{margin-top:12px;border-top:1px solid rgba(212,175,55,.14);padding-top:10px}
  #apInfo .fl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:#8a8170;text-transform:uppercase}
  #apInfo .fv{font-size:14px;color:#e7e0cc;line-height:1.65;margin-top:3px}
  #apShare{width:100%;margin-top:20px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:.06em;color:#11100a;
    background:linear-gradient(var(--goldL),var(--gold));border:none;border-radius:999px;padding:13px;cursor:pointer}
  #share{position:fixed;inset:0;z-index:28;background:radial-gradient(120% 90% at 50% 18%,#17131f,#05050a 76%);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:22px}
  #share.show{display:flex}
  #shClose{position:absolute;top:calc(10px + env(safe-area-inset-top));right:14px;width:40px;height:40px;border-radius:50%;background:rgba(30,24,30,.7);border:1px solid #ffffff22;color:#e7dcc2;font-size:20px;cursor:pointer;z-index:2}
  .shKicker{font-family:'Cinzel',serif;letter-spacing:.5em;font-size:12px;color:var(--gold);opacity:.9}
  #shWrap{display:flex;align-items:center;justify-content:center;min-height:200px}
  #shWrap canvas{max-height:64vh;max-width:84vw;width:auto;height:auto;border-radius:10px;
    border:1px solid rgba(212,175,55,.35);box-shadow:0 0 54px rgba(202,164,74,.28),0 24px 70px rgba(0,0,0,.7)}
  #shWrap .shLoad{color:#8a8170;letter-spacing:.2em;font-family:'Cinzel',serif}
  #shSave{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.08em;font-size:15px;color:#11100a;
    background:linear-gradient(var(--goldL),var(--gold));border:none;border-radius:999px;padding:14px 34px;cursor:pointer;box-shadow:0 8px 30px rgba(202,164,74,.45)}
  .shHint{font-size:11px;letter-spacing:.1em;color:#8a8170}

  #benming{position:fixed;inset:0;z-index:20;background:rgba(4,3,8,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
  #benming.show{display:flex}
  #benming .kicker{font-family:'Cinzel',serif;letter-spacing:.4em;color:#e8c14a;font-size:13px;margin-bottom:14px}
  #benming .bmart{width:60vw;height:40vh;background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:10px;box-shadow:0 0 60px rgba(232,193,74,.4),0 20px 60px #000;-webkit-touch-callout:none}
  #benming .bt{font-weight:700;font-size:26px;margin:16px 0 6px}
  #benming .bty{font-size:15px;color:#cdbca0}
  #benming .taste{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#e7dcc2;margin-top:16px}
  #benming button{margin-top:24px;font-family:'Cinzel',serif;font-size:14px;letter-spacing:.1em;color:#e8c14a;background:transparent;border:1px solid #e8c14a55;border-radius:999px;padding:10px 24px;cursor:pointer}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8a8170;font-family:'Cinzel',serif;letter-spacing:.3em;z-index:30}
</style></head>
<body>
<div id="loading">LOADING ART…</div>
<div id="stage"></div>
<div id="touchlayer"></div>
<div id="rays"></div>
<div id="flash"></div>
<div id="hud"><span id="pity" title="距金牌保底" style="color:#caa44a"></span></div>
<button id="benmingBtn" class="fab">揭晓本命</button>
<div id="hint">上滑抽卡 · 下滑看详情 · 发光卡点翻 · 点卡心动</div>
<div id="appraise">
  <div id="apBar"><span>鉴 赏</span><button id="apClose">×</button></div>
  <div id="apImgWrap"><div id="apImg"></div><div id="apZoomHint">点击放大 · 拖动查看 · 再点还原</div></div>
  <div id="apInfo"></div>
</div>
<div id="share">
  <button id="shClose">×</button>
  <div class="shKicker">✦ 收 藏 卡 ✦</div>
  <div id="shWrap"></div>
  <button id="shSave">📤 保存 / 分享</button>
  <div class="shHint">长按图片可保存 · 或点上方分享</div>
</div>
<div id="benming"></div>

<script type="module">
import { renderShareCanvas, serialFromId } from "./js/share-image.js";   // 复用游戏的分享卡渲染
const RC = { N:"#9aa3b2", R:"#5aa6ff", SR:"#bd7dff", SSR:"#ffd34d" };
const LABEL = { N:"普通", R:"稀有", SR:"史诗", SSR:"传世" };
const MUSEUM = { met:"大都会艺术博物馆", artic:"芝加哥艺术博物馆", cleveland:"克利夫兰艺术博物馆", vam:"V&A 博物馆" };
// 翻牌概率（蒙特卡洛已验：SSR 间隔均值~23/中位25/p95 36/硬顶40；SR+ 最长12；连N≤5）
const RATES = { base:{N:64.5,R:26,SR:8,SSR:1.5}, ssrSoftStart:20, ssrSoftStep:2, ssrHard:40,
  srHard:12, srUp:0.10, nMaxRun:5, firstSSRlo:4, firstSSRhi:8 };
const FLIP = { N:{build:300,int:.22}, R:{build:680,int:.45}, SR:{build:1250,int:.72}, SSR:{build:2050,int:.96} };
const JACKPOT = new Set(["SR","SSR"]);
const STARS = { N:1, R:2, SR:3, SSR:4 };

let ac;
function actx(){ try{ ac = ac || new (window.AudioContext||window.webkitAudioContext)(); return ac; }catch{ return null; } }
function blip(freq,dur=0.12,type="sine",vol=0.18){ const c=actx(); if(!c) return;
  const o=c.createOscillator(),g=c.createGain(); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0008,c.currentTime+dur);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur); }
function swish(){ blip(220,0.08,"triangle",0.06); }
function riser(r,build){ const c=actx(); if(!c) return;
  const o=c.createOscillator(),g=c.createGain(); o.type="sawtooth";
  const t0=c.currentTime,t1=t0+build/1000, top={N:300,R:430,SR:620,SSR:920}[r]||300;
  o.frequency.setValueAtTime(130,t0); o.frequency.exponentialRampToValueAtTime(top,t1);
  g.gain.setValueAtTime(0.0008,t0); g.gain.exponentialRampToValueAtTime(0.07,t1);
  o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t1+0.05); }
function land(r){ const base={N:520,R:660,SR:820,SSR:990}[r]||520;
  blip(base,0.16,"triangle",0.16); if(r==="SR"||r==="SSR") setTimeout(()=>blip(base*1.5,0.2,"sine",0.13),60); }
function jackpot(){ [0,90,180,300].forEach((d,i)=>setTimeout(()=>blip([784,988,1175,1568][i],0.22,"sine",0.16),d)); }
function heartSnd(){ blip(740,0.1,"sine",0.14); setTimeout(()=>blip(1100,0.12,"sine",0.1),50); }
function sparkleBurst(n=16){ for(let i=0;i<n;i++){ const s=document.createElement("i"); s.className="burstdot";
  const a=(i/n)*Math.PI*2+Math.random()*.3, d=130+Math.random()*200;
  s.style.setProperty("--tx",(Math.cos(a)*d).toFixed(0)+"px"); s.style.setProperty("--ty",(Math.sin(a)*d).toFixed(0)+"px");
  document.body.appendChild(s); setTimeout(()=>s.remove(),900); } }

const MUS = ["met","artic","cleveland","vam"];
let pool = [];
async function load(){
  const all = await Promise.all(MUS.map(m => fetch(`data/museums/${m}.json`).then(r=>r.json()).catch(()=>null)));
  for(const d of all){ if(!d) continue; for(const x of d.items){ if(x.img) pool.push(x); } }
  document.getElementById("loading").remove();
}
// ── 抽取：软/硬保底 + 新手垫刀 + 防连黑；pity 跨局持久（localStorage 容错）──
let P=(()=>{ try{ return JSON.parse(localStorage.getItem("yywn.pity"))||{}; }catch{ return {}; } })();
P.pulls??=0; P.sinceSSR??=0; P.sinceSR??=0; P.nRun??=0; P.gotFirst??=false;
P.firstAt??= RATES.firstSSRlo + ((Math.random()*(RATES.firstSSRhi-RATES.firstSSRlo+1))|0);
function savePity(){ try{ localStorage.setItem("yywn.pity",JSON.stringify(P)); }catch{} }
function hit(k){ if(k==="SSR"){ P.sinceSSR=0; P.gotFirst=true; } else P.sinceSSR++;
  if(k==="SSR"||k==="SR") P.sinceSR=0; else P.sinceSR++;
  P.nRun = k==="N" ? P.nRun+1 : 0; savePity(); return k; }
function drawRarity(){
  P.pulls++;
  if(!P.gotFirst && P.pulls>=P.firstAt) return hit("SSR");                                  // 新手垫刀：前4-8抽必见金
  if(P.sinceSSR>=RATES.ssrHard-1) return hit("SSR");                                        // 硬保底
  if(P.sinceSR>=RATES.srHard-1) return hit(Math.random()<RATES.srUp?"SSR":"SR");            // SR 保底(10%升金)
  const w={...RATES.base};
  if(P.sinceSSR>=RATES.ssrSoftStart) w.SSR+=(P.sinceSSR-RATES.ssrSoftStart+1)*RATES.ssrSoftStep;  // 软保底：干旱越久金越涨
  if(P.nRun>=RATES.nMaxRun) w.N=0;                                                          // 防连黑：第6张必≥R
  const tot=w.N+w.R+w.SR+w.SSR; let r=Math.random()*tot;
  for(const k of ["N","R","SR","SSR"]){ r-=w[k]; if(r<=0) return hit(k); } return hit("N");
}
function next(){ const want=drawRarity(); const b=pool.filter(x=>x.rarity===want); const list=b.length?b:pool;
  return list[(Math.random()*list.length)|0]; }

const stage = document.getElementById("stage");
let current = null, curCard = null, hearted = [], heartCount = 0;
const fld = (x,z,e)=> x[z] || x[e] || "";
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const urlEsc = u => String(u??"").replace(/['"()\\\s]/g,"");

function showBack(item){
  const r=item.rarity||"N", u=urlEsc(item.img);
  const card=document.createElement("div");
  card.className="card"; card.dataset.r=r; card.__item=item; card.__state="back"; card.style.setProperty("--rc",RC[r]);
  card.innerHTML=`
    <div class="floatwrap"><div class="flip">
      <div class="face back">
        <div class="pat"></div><div class="ring"></div><div class="sheen"></div>
        <div class="emblem">❖</div><div class="bhint">点击翻牌</div>
        <i class="spark" style="left:28%;animation:rise 3.6s ease-in infinite .2s"></i>
        <i class="spark" style="left:54%;animation:rise 4.2s ease-in infinite 1.1s"></i>
        <i class="spark" style="left:72%;animation:rise 3.2s ease-in infinite 2s"></i>
      </div>
      <div class="face front">
        <div class="crown"><span class="gem"></span><span class="rt">${r} · ${LABEL[r]} <span class="stars">${"✦".repeat(STARS[r]||1)}</span></span></div>
        <div class="window"><div class="fartbg" style="background-image:url('${u}')"></div><div class="fart" style="background-image:url('${u}')"></div></div>
        <div class="plate">
          <div class="ttl">${esc(fld(item,"title_zh","title"))}</div>
          <div class="by">${esc(item.artist||"")} ${item.year?(" · "+esc(item.year)):""}</div>
          <div class="divider"></div>
          <div class="line">${esc(fld(item,"cardline_zh","cardline")||"")}</div>
          <div class="serial"><span>${esc(serialFromId(item.id))}</span><span>限量认证 ✦ MMXXVI</span></div>
        </div>
        <div class="holo"></div>
      </div>
    </div></div>`;
  const old=stage.firstElementChild; stage.appendChild(card); curCard=card; current=null;
  document.getElementById("pity").textContent = `距金保底 ✦${Math.max(0,RATES.ssrHard-P.sinceSSR)}`;
  requestAnimationFrame(()=>card.classList.add("in"));
  if(old) setTimeout(()=>old.remove(),260);
  if(JACKPOT.has(r)) card.classList.add("pending");
  else setTimeout(()=>{ if(card===curCard && card.__state==="back") flipCard(card); }, 300);
}
function advance(){ swish(); showBack(next()); }

function flipCard(card){
  if(card.__state!=="back") return;
  card.__state="flipping";
  const r=card.dataset.r, cfg=FLIP[r]||FLIP.N;
  card.classList.remove("pending");
  card.style.setProperty("--build",cfg.build+"ms");
  card.classList.add("charging"); riser(r,cfg.build);
  setTimeout(()=>{
    card.classList.remove("charging");
    card.querySelector(".flip").classList.add("flipped");
    card.classList.add("revealed");                                                      // 翻开后轻微浮动
    setTimeout(()=>{ const b=card.querySelector(".back"); if(b) b.style.visibility="hidden"; }, 150);  // 兜底：翻过 90° 藏整个背面板
    const f=document.getElementById("flash"); f.style.setProperty("--bc",RC[r]); f.style.setProperty("--int",cfg.int);
    f.classList.remove("go"); void f.offsetWidth; f.classList.add("go");
    land(r);
    const front=card.querySelector(".front");
    if(r==="SSR"){ front.classList.add("holo-on"); jackpot(); sparkleBurst(16);
      const rays=document.getElementById("rays"); rays.classList.remove("go"); void rays.offsetWidth; rays.classList.add("go"); }
    else if(r==="SR"){ front.classList.add("holo-lite"); jackpot(); sparkleBurst(8); }
    card.__state="front"; current=card.__item;
  }, cfg.build);
}

function doHeart(){
  if(!current) return;
  if(!hearted.includes(current)){ hearted.push(current); heartCount++; }
  const h=document.createElement("div"); h.className="heart"; h.textContent="♥"; document.body.appendChild(h);
  requestAnimationFrame(()=>h.classList.add("go")); setTimeout(()=>h.remove(),900);
  heartSnd();
  if(heartCount>=6) document.getElementById("benmingBtn").style.display="block";
}
function tapAction(){ if(!curCard) return;
  if(curCard.__state==="back") flipCard(curCard);
  else if(curCard.__state==="front") doHeart(); }

// ── 鉴赏页：大图 + 缩放 + 完整信息 ──
const apEl=document.getElementById("appraise"), apImg=document.getElementById("apImg"), apInfo=document.getElementById("apInfo"), apWrap=document.getElementById("apImgWrap");
let apZoom=false;
function fillAppraise(it){
  apImg.style.backgroundImage=`url('${urlEsc(it.img)}')`; apImg.style.transform="scale(1)"; apZoom=false;
  const r=it.rarity||"N";
  const row=(l,v)=> v?`<div class="field"><div class="fl">${l}</div><div class="fv">${esc(v)}</div></div>`:"";
  apInfo.innerHTML=`
    <div class="rt" style="color:${RC[r]}">${r} · ${LABEL[r]}</div>
    <div class="ttl">${esc(fld(it,"title_zh","title"))}</div>
    <div class="by">${esc(it.artist||"")} ${it.year?(" · "+esc(it.year)):""}</div>
    <div class="line">${esc(fld(it,"cardline_zh","cardline")||"")}</div>
    ${row("收藏馆", MUSEUM[it.museum]||it.museum)}
    ${row("媒材", it.medium)}
    ${row("尺寸", it.dimensions)}
    ${row("简介", fld(it,"description_zh","description"))}
    <button id="apShare">📤 生成收藏卡 · 分享</button>`;
  apInfo.querySelector("#apShare").onclick=()=>shareCurrent(it);
}
function openAppraise(it){ if(!it) return; fillAppraise(it);
  apEl.style.transition=""; apEl.style.opacity=""; apEl.classList.remove("peek"); apEl.classList.add("show"); }
function peekAppraise(it){ if(!it) return; fillAppraise(it);
  apEl.style.transition="none"; apEl.style.opacity="0"; apEl.classList.add("peek"); }
function commitAppraise(){ apEl.classList.remove("peek"); apEl.classList.add("show");
  apEl.style.transition="opacity .15s"; apEl.style.opacity="1";
  setTimeout(()=>{ apEl.style.transition=""; apEl.style.opacity=""; },180); }
function cancelAppraise(){ apEl.style.transition="opacity .18s"; apEl.style.opacity="0";
  setTimeout(()=>{ apEl.classList.remove("peek"); apEl.style.transition=""; apEl.style.opacity=""; },200); }
function closeAppraise(){ apEl.style.transition="opacity .18s"; apEl.style.opacity="0";
  setTimeout(()=>{ apEl.classList.remove("show"); apEl.style.transition=""; apEl.style.opacity=""; },200); }
function apSetOrigin(x,y){ const r=apWrap.getBoundingClientRect();
  apImg.style.transformOrigin=`${Math.max(0,Math.min(100,(x-r.left)/r.width*100))}% ${Math.max(0,Math.min(100,(y-r.top)/r.height*100))}%`; }
// 鉴赏页内：点击放大/还原；放大时拖动平移
let apDownX=0,apDownY=0,apMoved=false;
apWrap.addEventListener("pointerdown",e=>{ apDownX=e.clientX; apDownY=e.clientY; apMoved=false; });
apWrap.addEventListener("pointermove",e=>{ if(Math.hypot(e.clientX-apDownX,e.clientY-apDownY)>6){ apMoved=true; if(apZoom){ apSetOrigin(e.clientX,e.clientY); } } });
apWrap.addEventListener("pointerup",e=>{
  if(apMoved){ if(!apZoom && (e.clientY-apDownY)<-80) closeAppraise(); return; }   // 详情页上滑 → 返回卡片
  apZoom=!apZoom; if(apZoom){ apSetOrigin(e.clientX,e.clientY); apImg.style.transform="scale(2.6)"; } else apImg.style.transform="scale(1)"; });
document.getElementById("apClose").onclick=closeAppraise;

// ── 分享：复用游戏 renderShareCanvas 合成收藏卡 ──
const FAKE_VAL={N:"¥ 1,280",R:"¥ 24,600",SR:"¥ 386,000",SSR:"¥ 9,420,000"};
const shareEl=document.getElementById("share"), shWrap=document.getElementById("shWrap");
async function shareCurrent(it){
  it=it||current; if(!it) return; const r=it.rarity||"N";
  shWrap.innerHTML='<div class="shLoad">生成中…</div>'; shareEl.classList.add("show");
  try{
    const wall=pool.filter(x=>x.img&&x.id!==it.id).sort(()=>Math.random()-.5).slice(0,12).map(x=>x.img);
    const canvas=await renderShareCanvas({
      heroSrc:it.img, wallSrcs:wall, rarity:r, rarityLabel:LABEL[r],
      pieceTitle:fld(it,"title_zh","title"), artist:it.artist||"", yearText:String(it.year||it.date||""),
      museumLabel:MUSEUM[it.museum]||it.museum, serial:serialFromId(it.id),
      titleText:"一眼万年", kicker:"THE GAME THEORY", scoreLabel:"估值", amount:FAKE_VAL[r]||"",
      brag:fld(it,"cardline_zh","cardline"),
      url:"https://thegametheory.pages.dev", scanLabel:"扫码开抽", urlLabel:"thegametheory.pages.dev",
    });
    shWrap.replaceChildren(canvas);
  }catch(e){ shWrap.innerHTML='<div class="shLoad">生成失败</div>'; }
}
document.getElementById("shClose").onclick=()=>shareEl.classList.remove("show");
document.getElementById("shSave").onclick=()=>{ const cv=shWrap.querySelector("canvas"); if(!cv) return;
  cv.toBlob(async b=>{ if(!b) return; const file=new File([b],"art-looting.png",{type:"image/png"});
    if(navigator.canShare?.({files:[file]})){ try{ await navigator.share({files:[file],title:"Art Looting"}); return; }catch{} }
    const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="art-looting.png"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },"image/png"); };

// ── 本命 ──
function benming(){
  if(!hearted.length) return;
  const ord={N:0,R:1,SR:2,SSR:3};
  const star=[...hearted].sort((a,b)=>ord[b.rarity]-ord[a.rarity])[0];
  const cent={}, art={};
  for(const x of hearted){ const c=x.year?Math.floor(x.year/100)+1:null; if(c)cent[c]=(cent[c]||0)+1;
    const a=(x.artist||"").split("(")[0].trim(); if(a)art[a]=(art[a]||0)+1; }
  const topCent=Object.entries(cent).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const topArt=Object.entries(art).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const taste=[topCent?`${topCent}世纪`:null, topArt].filter(Boolean).join(" · ");
  const el=document.getElementById("benming");
  el.innerHTML=`<div class="kicker">YOUR DESTINED PIECE · 本命</div>
    <div class="bmart" style="background-image:url('${urlEsc(star.img)}')"></div>
    <div class="bt">${esc(fld(star,"title_zh","title"))}</div>
    <div class="bty">${esc(star.artist||"")} ${star.year?(" · "+esc(star.year)):""}</div>
    <div class="taste">你偏爱 ${esc(taste||"独一无二的眼光")}</div>
    <button id="again">继续刷</button>`;
  el.classList.add("show");
  const bmart=el.querySelector(".bmart");
  const im=new Image(); im.onload=()=>{ const r=Math.min(innerWidth*0.82/im.naturalWidth, innerHeight*0.46/im.naturalHeight);
    bmart.style.width=Math.round(im.naturalWidth*r)+"px"; bmart.style.height=Math.round(im.naturalHeight*r)+"px"; }; im.src=star.img;
  jackpot();
  el.querySelector("#again").onclick=()=>el.classList.remove("show");
}

// ── 输入：上滑跟手换卡 / 轻点翻牌或心动（全走透明层）──
const touchlayer=document.getElementById("touchlayer");
let tX=0,tY=0,tStart=0,moved=false,apPeeking=false;
touchlayer.addEventListener("touchstart",e=>{ if(e.touches.length!==1) return;
  const t=e.touches[0]; tX=t.clientX; tY=t.clientY; tStart=Date.now(); moved=false; e.preventDefault();
},{passive:false});
touchlayer.addEventListener("touchmove",e=>{ const t=e.touches[0]; if(!t||!curCard) return;
  const dy=t.clientY-tY; if(Math.abs(dy)>8) moved=true;
  curCard.style.transition="none"; curCard.style.transform=`translateY(${dy}px)`;
  curCard.style.opacity=String(Math.max(.25,1-Math.abs(dy)/500));
  if(dy>0 && curCard.__state==="front"){                              // 下拉：详情随手指在背后显形
    if(!apPeeking){ peekAppraise(current); apPeeking=true; }
    apEl.style.opacity=String(Math.min(.96, dy/240));
  } else if(apPeeking){ apEl.style.opacity="0"; }
  e.preventDefault();
},{passive:false});
touchlayer.addEventListener("touchend",e=>{ const dy=e.changedTouches[0].clientY-tY, dur=Date.now()-tStart;
  if(curCard && dy<-80){ if(apPeeking){ cancelAppraise(); apPeeking=false; }
    curCard.style.transition="transform .22s ease,opacity .22s"; curCard.style.transform="translateY(-115%)"; curCard.style.opacity="0"; advance(); return; }
  if(curCard){ curCard.style.transition="transform .25s cubic-bezier(.2,.8,.2,1),opacity .25s"; curCard.style.transform="translateY(0)"; curCard.style.opacity="1"; }
  if(dy>80 && curCard?.__state==="front" && apPeeking){ commitAppraise(); apPeeking=false; e.preventDefault(); return; }  // 过线 → 正式进详情
  if(apPeeking){ cancelAppraise(); apPeeking=false; }                  // 不够 → 详情退回
  if(!moved && dur<350) tapAction();
  e.preventDefault();
},{passive:false});
touchlayer.addEventListener("click",()=>tapAction());
let wlock=0;
window.addEventListener("wheel",e=>{ const now=Date.now(); if(now-wlock<350) return; if(Math.abs(e.deltaY)>10){ wlock=now; advance(); } },{passive:true});
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"||e.key===" "){ e.preventDefault(); if(apEl.classList.contains("show")) closeAppraise(); else advance(); }
  else if(e.key==="ArrowDown"){ e.preventDefault(); if(current) openAppraise(current); }
  else if(e.key==="Enter"||e.key.toLowerCase()==="f") tapAction();
  else if(e.key.toLowerCase()==="h") doHeart();
  else if(e.key.toLowerCase()==="a"){ if(current) openAppraise(current); }
  else if(e.key.toLowerCase()==="b") benming();
});
document.getElementById("benmingBtn").onclick=benming;

await load();
showBack(next());
</script>
