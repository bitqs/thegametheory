<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>游戏的诞生 · The Game Theory №2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+SC:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="top"><div class="toplabel"><span id="goalName">PROGRESS</span><span id="goalPct">0%</span></div>
    <div class="bar"><i id="goalFill"></i></div></div>
  <div id="hud">
    <div class="chip" id="cScore">分数 <b>0</b></div>
    <div class="chip" id="cLevel">LV <b>1</b></div>
    <div class="chip" id="cCollect">收藏 <b>0</b></div>
    <div class="chip" id="cEnergy">心力 <span id="energyDots"></span></div>
  </div>
  <div id="stage"></div>
  <div id="flash"></div>
  <div id="say"></div>
  <div id="insight"><div class="txt"></div></div>
  <div id="hint"></div>
  <div id="mute">♪</div>
  <div id="kbd">空格/↑ 上滑 · ↓ 下滑 · 回车 点击</div>

  <div class="veil" id="lang">
    <div class="langttl">THE GAME THEORY · №2</div>
    <div class="langsub">选择语言 · CHOOSE LANGUAGE</div>
    <div class="langcards" id="langcards"></div>
    <div class="langtip">轻触一张牌 · TAP A CARD</div>
  </div>
  <div class="veil" id="philo"></div>
  <div class="veil" id="choice">
    <div class="q">你继续翻，是因为——</div>
    <div class="opts">
      <div class="opt"><span class="g">↑ 上滑</span> 因为下一张，可能更好</div>
      <div class="opt"><span class="g">↓ 下滑</span> 因为想看，故事怎么结束</div>
      <div class="opt"><span class="g">○ 点击</span> 没有因为，就是想翻</div>
    </div>
  </div>
  <div class="veil" id="end">
    <div class="card-final"><div class="ec"></div><div class="el"></div><div class="tag">THE GAME THEORY · №2</div></div>
    <div class="ebtns"><div class="ebtn" id="endShare">生成战绩卡</div><div class="ebtn" id="endAgain">再玩一次</div></div>
  </div>

  <div id="share">
    <canvas id="shareCanvas" width="540" height="960"></canvas>
    <div class="srow" id="srowMain"><div class="sbtn" id="dl">保存图片</div><div class="sbtn" id="closeShare">关闭</div></div>
    <div class="srow" id="srowEnergy" hidden><div class="sbtn" id="shGain">分享给朋友　＋3 心力</div><div class="sbtn" id="shSkip">不分享，继续</div></div>
    <div class="tip" id="shareTip">长按图片可保存 · thegametheory.pages.dev</div>
  </div>

  <div id="danger"></div>
  <div id="touchlayer"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
